<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 280px;
      padding: 16px;
      color: #1a1a1a;
      background: #fff;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .logo {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .logo span { opacity: 0.5; }
    .status {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #DCFCE7;
      color: #166534;
      margin-left: auto;
    }
    .stats {
      display: flex;
      gap: 16px;
      padding: 10px 0;
      border-top: 1px solid #f0f0f0;
      border-bottom: 1px solid #f0f0f0;
      margin-bottom: 12px;
    }
    .stat {
      text-align: center;
      flex: 1;
    }
    .stat-value {
      font-size: 20px;
      font-weight: 600;
    }
    .stat-label {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }
    .stat-value.threats { color: #DC2626; }
    .setting {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }
    .setting-label {
      font-size: 13px;
    }
    .setting-sub {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #ccc;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      bottom: 2px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .toggle-slider {
      background: #DC2626;
    }
    .toggle input:checked + .toggle-slider::before {
      transform: translateX(16px);
    }
    .footer {
      font-size: 11px;
      color: #aaa;
      text-align: center;
      margin-top: 12px;
      padding-top: 8px;
      border-top: 1px solid #f0f0f0;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">RA<span>(I)</span></div>
    <div class="status" id="status">Active</div>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="scans">0</div>
      <div class="stat-label">Scans</div>
    </div>
    <div class="stat">
      <div class="stat-value threats" id="threats">0</div>
      <div class="stat-label">Threats</div>
    </div>
  </div>
  <div class="setting">
    <div>
      <div class="setting-label">Strict mode</div>
      <div class="setting-sub">Block paste on critical threats</div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="strict-toggle">
      <span class="toggle-slider"></span>
    </label>
  </div>
  <div class="footer">Zero data leaves your device.</div>
  <script src="popup.ts" type="module"></script>
</body>
</html>
