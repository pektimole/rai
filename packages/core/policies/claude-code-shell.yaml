# RAI ActionGate policy: Claude Code shell adapter
# Hook: PreToolUse on Bash tool calls
# Expand by appending to this file, never by code change.

version: 1
adapter: shell
fail_closed: false  # blocklist mode: allow unless explicitly blocked

blocked_commands:
  - shutdown
  - reboot
  - mkfs
  - dd

blocked_patterns:
  - "git push --force"
  - "git push -f"
  - "git reset --hard"
  - "--no-verify"
  - "rm -rf /"
  - "rm -rf ~"
  - "> /dev/"

# No working dir restriction for now (Claude Code operates in project dir)
