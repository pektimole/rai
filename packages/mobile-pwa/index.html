<!doctype html>
<html lang="en">
 <head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
 <meta name="theme-color" content="#0b0d10" />
 <title>RA(I) Mobile</title>
 <link rel="icon" href="/icon-192.png" />
 <style>
 * { box-sizing: border-box; margin: 0; padding: 0; }
 html, body { background: #fff; color: #1a1a1a; }
 body {
 font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
 font-size: 16px;
 line-height: 1.45;
 -webkit-tap-highlight-color: transparent;
 padding-bottom: env(safe-area-inset-bottom);
 }
 #app {
 max-width: 600px;
 margin: 0 auto;
 padding: 0 16px 32px;
 }
 .topbar {
 display: flex;
 align-items: center;
 gap: 10px;
 padding: 14px 0;
 border-bottom: 1px solid #f0f0f0;
 margin-bottom: 16px;
 }
 .brand {
 font-size: 22px;
 font-weight: 700;
 letter-spacing: -0.5px;
 }
 .brand .paren { opacity: 0.45; }
 .tagline {
 font-size: 12px;
 color: #888;
 margin-left: 4px;
 }
 .badge {
 margin-left: auto;
 font-size: 11px;
 font-weight: 600;
 padding: 3px 9px;
 border-radius: 11px;
 background: #FEE2E2;
 color: #991B1B;
 letter-spacing: 0.2px;
 }
 .badge.active { background: #DCFCE7; color: #166534; }

 main { display: flex; flex-direction: column; gap: 16px; }

 .empty-state {
 padding: 24px 16px;
 border: 1px dashed #ddd;
 border-radius: 10px;
 text-align: center;
 background: #fafafa;
 }
 .empty-state h2 {
 font-size: 17px;
 font-weight: 600;
 margin-bottom: 6px;
 }
 .empty-state p {
 font-size: 14px;
 color: #555;
 margin-bottom: 4px;
 }
 .empty-state .hint {
 font-size: 12px;
 color: #888;
 margin-top: 8px;
 }

 .latest-scan {
 border: 1px solid #f0f0f0;
 border-radius: 10px;
 padding: 14px;
 background: #fafafa;
 }
 .latest-card-header {
 display: flex;
 align-items: center;
 gap: 10px;
 margin-bottom: 10px;
 }
 .verdict-pill {
 font-size: 13px;
 font-weight: 700;
 text-transform: uppercase;
 letter-spacing: 0.4px;
 padding: 5px 12px;
 border-radius: 14px;
 }
 .verdict-pill.verdict-clean { background: #DCFCE7; color: #166534; }
 .verdict-pill.verdict-flagged { background: #FEF3C7; color: #92400E; }
 .verdict-pill.verdict-blocked { background: #FEE2E2; color: #991B1B; }
 .latest-conf {
 font-size: 12px;
 color: #888;
 }
 .latest-content {
 font-size: 14px;
 color: #2a2a2a;
 background: #fff;
 border: 1px solid #eee;
 border-radius: 6px;
 padding: 10px 12px;
 max-height: 160px;
 overflow: auto;
 white-space: pre-wrap;
 word-break: break-word;
 line-height: 1.5;
 margin-bottom: 10px;
 }
 .latest-signals {
 font-size: 13px;
 color: #444;
 line-height: 1.6;
 margin-bottom: 10px;
 }
 .signal-row {
 display: flex;
 gap: 8px;
 align-items: baseline;
 }
 .signal-layer {
 font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
 font-size: 11px;
 color: #999;
 min-width: 32px;
 }
 .signal-body { flex: 1; }
 .signal-severity {
 color: #999;
 font-size: 11px;
 margin-left: 4px;
 }
 .signals-empty {
 font-size: 12px;
 color: #999;
 }
 .latest-explanation {
 font-size: 13px;
 font-style: italic;
 color: #555;
 margin-bottom: 12px;
 line-height: 1.5;
 }
 .label-row {
 display: flex;
 gap: 8px;
 margin-bottom: 10px;
 }
 .label-btn {
 flex: 1;
 font: inherit;
 font-size: 14px;
 padding: 12px 8px;
 min-height: 44px;
 border: 1px solid #ddd;
 border-radius: 8px;
 background: #fff;
 cursor: pointer;
 transition: background 0.12s, transform 0.08s;
 }
 .label-btn:hover { background: #f5f5f5; }
 .label-btn:active { transform: scale(0.97); background: #ececec; }
 .label-confirm {
 font-size: 13px;
 font-weight: 600;
 color: #166534;
 text-align: center;
 padding: 10px 0;
 margin-bottom: 6px;
 }
 .latest-meta {
 font-size: 11px;
 color: #999;
 }

 .byok {
 border: 1px solid #f0f0f0;
 border-radius: 10px;
 padding: 14px;
 }
 .byok-label {
 font-size: 14px;
 font-weight: 600;
 margin-bottom: 4px;
 }
 .byok-sub {
 font-size: 12px;
 color: #888;
 margin-bottom: 10px;
 line-height: 1.5;
 }
 .byok-input-row {
 display: flex;
 gap: 8px;
 }
 .byok-input-row input {
 flex: 1;
 font: inherit;
 font-size: 14px;
 font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
 padding: 10px 12px;
 min-height: 44px;
 border: 1px solid #ddd;
 border-radius: 6px;
 }
 .byok-input-row input:focus {
 outline: none;
 border-color: #1a1a1a;
 }
 .byok-input-row button,
 .byok-clear-btn {
 font: inherit;
 font-size: 14px;
 font-weight: 600;
 padding: 10px 16px;
 min-height: 44px;
 border: none;
 border-radius: 6px;
 background: #1a1a1a;
 color: #fff;
 cursor: pointer;
 }
 .byok-input-row button:active,
 .byok-clear-btn:active { transform: scale(0.97); }
 .byok-active-row {
 display: flex;
 align-items: center;
 gap: 12px;
 font-size: 13px;
 }
 .byok-status {
 flex: 1;
 color: #166534;
 font-weight: 500;
 }
 .byok-clear-btn { background: #888; }

 .corpus-controls {
 display: flex;
 flex-direction: column;
 gap: 8px;
 }
 .export-btn,
 .pick-file-btn {
 font: inherit;
 font-size: 14px;
 padding: 12px;
 min-height: 44px;
 border: 1px solid #ddd;
 border-radius: 8px;
 background: #fff;
 cursor: pointer;
 width: 100%;
 }
 .export-btn:active,
 .pick-file-btn:active { background: #f0f0f0; transform: scale(0.99); }
 .pick-file-btn { font-weight: 600; }
 .pick-file-btn[disabled] { opacity: 0.6; cursor: progress; }
 .manual-pick { display: flex; flex-direction: column; gap: 6px; }
 .manual-pick .hint {
 font-size: 11px;
 color: #888;
 text-align: center;
 }
 .corpus-line {
 font-size: 12px;
 color: #888;
 text-align: center;
 }

 .footer-line {
 font-size: 12px;
 color: #aaa;
 text-align: center;
 padding: 12px 0;
 border-top: 1px solid #f0f0f0;
 margin-top: 8px;
 }

 [hidden] { display: none !important; }

 @media (prefers-color-scheme: dark) {
 html, body { background: #0b0d10; color: #e7e7e7; }
 .topbar { border-bottom-color: #222; }
 .empty-state { background: #14171b; border-color: #2a2e34; }
 .empty-state p { color: #aaa; }
 .empty-state .hint { color: #888; }
 .latest-scan { background: #14171b; border-color: #2a2e34; }
 .latest-content { background: #0b0d10; border-color: #2a2e34; color: #ddd; }
 .latest-explanation { color: #aaa; }
 .label-btn { background: #14171b; border-color: #2a2e34; color: #ddd; }
 .label-btn:hover { background: #1c2026; }
 .byok { border-color: #2a2e34; }
 .byok-input-row input { background: #0b0d10; border-color: #2a2e34; color: #ddd; }
 .byok-input-row button, .byok-clear-btn { background: #e7e7e7; color: #0b0d10; }
 .byok-clear-btn { background: #555; color: #fff; }
 .export-btn,
 .pick-file-btn { background: #14171b; border-color: #2a2e34; color: #ddd; }
 .footer-line { border-top-color: #222; color: #777; }
 }
 </style>
 </head>
 <body>
 <div id="app">
 <header class="topbar">
 <span class="brand">RA<span class="paren">(</span>I<span class="paren">)</span></span>
 <span class="tagline">Ambient AI firewall</span>
 <span id="p1-badge" class="badge">P0 only</span>
 </header>
 <main>
 <section id="empty-state" class="empty-state">
 <h2>Share a screenshot to scan</h2>
 <p>From any app: take a screenshot, tap Share, choose RA(I).</p>
 <p class="hint">Pixels stay on this device. P0 runs locally; P1 only if your BYOK key is set.</p>
 </section>
 <section id="latest-scan" class="latest-scan" hidden></section>
 <section class="manual-pick">
 <button id="pick-file-btn" type="button" class="pick-file-btn">Pick a screenshot to scan</button>
 <input id="pick-file-input" type="file" accept="image/*" hidden />
 <div class="hint">Works on Mac and iOS too — no share-sheet needed.</div>
 </section>
 <section id="byok" class="byok"></section>
 <section class="corpus-controls">
 <button id="export-btn" type="button" class="export-btn">Export labelled corpus (JSONL)</button>
 <div id="corpus-line" class="corpus-line"></div>
 </section>
 </main>
 <div id="footer-line" class="footer-line">Zero data leaves your device.</div>
 </div>
 <script type="module" src="/src/main.ts"></script>
 </body>
</html>
